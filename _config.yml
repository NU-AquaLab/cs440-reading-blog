title: "CS 440 Reading Blog"
description: "Advanced Networking — Fall 2026 — Northwestern University"
author: "Your Name"

# GitHub Pages settings
remote_theme: pages-themes/minimal@v0.2.0
plugins:
  - jekyll-remote-theme

# Build settings
markdown: kramdown
permalink: /:year/:month/:day/:title/

# Collections for organizing posts
defaults:
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"

# Exclude from build
exclude:
  - README.md
  - LICENSE
  - TEMPLATE.md
